version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: fastmarket_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fastmarket_db
    ports:
      - "3306:3306"
    volumes:
      - ../database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  web:
    image: php:8.2-apache
    container_name: fastmarket_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: fastmarket_db
      DB_USER: root
      DB_PASS: root
