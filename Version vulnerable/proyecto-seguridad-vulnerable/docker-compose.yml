services:
  db:
    image: mysql:8.0
    container_name: fastmarket_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fastmarket_db
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmarket_web
    ports:
      - "8080:80"
    volumes:
      - ./vulnerable:/var/www/html
      - ./corregido:/var/www/html/corregido
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: fastmarket_db
      DB_USER: root
      DB_PASS: root
